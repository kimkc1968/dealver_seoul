                }
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

                <div class="mt-6 p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-3">
                    <i data-lucide="info" class="w-5 h-5 text-slate-400 shrink-0"></i>
                    <p class="text-xs text-slate-500 leading-relaxed font-medium">상세 일정 및 주소 정보는 상단 탭의 [Day 1~5] 및 [정보]에서 확인하실 수 있습니다.</p>
                </div>
            `;
        }

        function renderDay(container, dayIndex) {
            const day = scheduleData[dayIndex - 1];
            container.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="mb-6 p-6 md:p-8 rounded-[1.5rem] border ${day.theme} relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-8 opacity-10"><i data-lucide="calendar" class="w-24 h-24"></i></div>
                        <span class="text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] opacity-80">${day.date} / ${day.subtitle}</span>
                        <h2 class="text-2xl md:text-3xl font-black mb-2">${day.title}</h2>
                        <p class="text-sm opacity-90 font-medium italic">SynkUp Week 공식 상세 일정표</p>
                    </div>
                    <div class="space-y-3">
                        ${day.events.map(event => `
                            <div class="flex flex-col md:flex-row gap-3 md:gap-6 p-4 md:p-6 bg-white border border-slate-100 rounded-2xl shadow-sm hover:shadow-md transition-all group">
                                <div class="flex flex-row md:flex-col items-center justify-between md:justify-start min-w-[120px] md:border-r border-slate-50 md:pr-6">
                                    <div class="flex items-center gap-2 text-xs md:text-sm font-bold text-slate-600">
                                        <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-300"></i>
                                        <span>${event.time.split(' - ')[0]}</span>
                                    </div>
                                    <div class="hidden md:block h-8 w-px bg-slate-100 my-2"></div>
                                    <div class="text-[10px] md:text-xs text-slate-400 font-bold">${event.time.split(' - ')[1] || ""}</div>
                                </div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-3">
                                        <span class="p-2 rounded-xl ${getEventClass(event.type)} transition-colors">
                                            <i data-lucide="${event.icon}" class="w-4 h-4 md:w-5 md:h-5"></i>
                                        </span>
                                        <h4 class="text-base md:text-lg font-bold text-slate-800 leading-tight">${event.title}</h4>
                                    </div>
                                    ${event.speaker ? `<div class="flex items-center gap-1.5 mt-3 text-sm text-slate-500 font-semibold bg-slate-50 self-start px-2 py-1 rounded-lg border border-slate-100">
                                        <i data-lucide="user" class="w-3 h-3 text-slate-400"></i>
                                        <span>${event.speaker}</span>
                                    </div>` : ""}
                                    ${event.details ? `
                                        <ul class="space-y-2 mt-4">
                                            ${event.details.map(d => `<li class="text-sm text-slate-500 flex items-start gap-2.5 leading-relaxed font-medium">
                                                <i data-lucide="chevron-right" class="w-4 h-4 mt-0.5 text-slate-300 shrink-0"></i>
                                                <span>${d}</span>
                                            </li>`).join('')}
                                        </ul>` : ""}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderInfo(container) {
            container.innerHTML = `
                <div class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <section>
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="train-front" class="w-6 h-6 text-red-500"></i>KTX 열차 정보</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-white border border-slate-200 rounded-[1.5rem] p-6 shadow-sm relative overflow-hidden group">
                                <div class="absolute -top-4 -right-4 p-3 opacity-[0.03] text-slate-900"><i data-lucide="train-front" class="w-48 h-48"></i></div>
                                <div class="flex items-center gap-2 mb-4 relative"><span class="px-2 py-0.5 bg-red-100 text-red-600 rounded-md text-[10px] font-black uppercase">상행</span><span class="font-black text-slate-800 tracking-tight">KTX 326</span></div>
                                <div class="flex justify-between items-center mb-6 relative">
                                    <div class="text-center"><div class="text-3xl font-black text-slate-900 leading-none">10:33</div><div class="text-xs text-slate-400 font-bold mt-2 uppercase">부산역</div></div>
                                    <div class="flex-1 px-4 flex flex-col items-center"><div class="text-[10px] text-slate-400 font-black mb-2 uppercase">2h 35m</div><div class="w-full h-[2px] bg-slate-100 relative"><div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-red-500 rounded-full border-2 border-white shadow-sm"></div></div></div>
                                    <div class="text-center"><div class="text-3xl font-black text-slate-900 leading-none">13:08</div><div class="text-xs text-slate-400 font-bold mt-2 uppercase">수서역</div></div>
                                </div>
                            </div>
                            <div class="bg-white border border-slate-200 rounded-[1.5rem] p-6 shadow-sm relative overflow-hidden group">
                                <div class="absolute -top-4 -right-4 p-3 opacity-[0.03] text-slate-900"><i data-lucide="train-front" class="w-48 h-48 scale-x-[-1]"></i></div>
                                <div class="flex items-center gap-2 mb-4 relative"><span class="px-2 py-0.5 bg-blue-100 text-blue-600 rounded-md text-[10px] font-black uppercase">하행</span><span class="font-black text-slate-800 tracking-tight">KTX 339</span></div>
                                <div class="flex justify-between items-center mb-6 relative">
                                    <div class="text-center"><div class="text-3xl font-black text-slate-900 leading-none">13:55</div><div class="text-xs text-slate-400 font-bold mt-2 uppercase">수서역</div></div>
                                    <div class="flex-1 px-4 flex flex-col items-center"><div class="text-[10px] text-slate-400 font-black mb-2 uppercase">2h 19m</div><div class="w-full h-[2px] bg-slate-100 relative"><div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-red-500 rounded-full border-2 border-white shadow-sm"></div></div></div>
                                    <div class="text-center"><div class="text-3xl font-black text-slate-900 leading-none">16:14</div><div class="text-xs text-slate-400 font-bold mt-2 uppercase">부산역</div></div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section>
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="bed" class="w-6 h-6 text-indigo-500"></i>숙소 정보</h3>
                        <div class="bg-white border border-slate-200 rounded-[2rem] overflow-hidden shadow-sm flex flex-col lg:flex-row">
                            <div class="w-full lg:w-2/5 h-64 lg:h-auto bg-slate-100 relative overflow-hidden">
                                <img src="https://search.pstatic.net/common/?src=https%3A%2F%2Fldb-phinf.pstatic.net%2F20230216_47%2F1676513686848sCd4l_JPEG%2F--Hotel_Exterior_%25281%2529.jpg" alt="Hotel" class="w-full h-full object-cover">
                                <div class="absolute bottom-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-[10px] font-bold text-white flex items-center gap-2 border border-white/10"><i data-lucide="map-pin" class="w-3 h-3 text-red-400"></i>호텔 외관</div>
                            </div>
                            <div class="flex-1 p-6 md:p-8 flex flex-col justify-between">
                                <div><h4 class="text-2xl font-black text-slate-900 mb-1">호텔 크레센도 서울</h4><p class="text-indigo-600 text-xs font-black mb-6 uppercase">Managed by Accor</p><div class="flex items-start gap-4 mb-8"><div class="p-3 bg-slate-50 rounded-2xl border border-slate-100 text-slate-400"><i data-lucide="map-pin" class="w-5 h-5"></i></div><div><div class="text-[10px] text-slate-400 font-black mb-1 uppercase tracking-widest">Address</div><div class="text-base text-slate-700 font-semibold leading-relaxed">서울 강남구 봉은사로 428</div></div></div></div>
                                <a href="https://map.naver.com/p/entry/place/1986144087?lng=127.0469875&lat=37.5108166" target="_blank" class="flex items-center justify-center gap-2 bg-slate-900 text-white py-4 rounded-2xl text-sm font-black hover:bg-slate-800 transition-all shadow-xl active:scale-95"><i data-lucide="map" class="w-4 h-4"></i>네이버 지도에서 보기</a>
                            </div>
                        </div>
                    </section>
                </div>
            `;
        }

        function getEventClass(type) {
            switch (type) {
                case 'education': return 'bg-blue-100 text-blue-800';
                case 'work': return 'bg-slate-100 text-slate-800';
                case 'social': return 'bg-pink-100 text-pink-800';
                case 'move': return 'bg-amber-100 text-amber-800';
                case 'setup': return 'bg-emerald-100 text-emerald-800';
                default: return 'bg-slate-100 text-slate-800';
            }
        }

        window.onload = function() { renderContent(); };
    </script>
</body>
</html>
